<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>С Новым Годом 2024</title>
    <link rel="stylesheet" media="screen" href="./normalize.css">
    <link rel="stylesheet" media="screen" href="./style.css">
    <script src="./countdown.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <h1>ДО НОВОГО ГОДА ОСТАЛОСЬ:</h1>
        <div id="CDT">
            <div class="number-wrapper">
                <div class="line"></div>
                <div class="caption">Дней</div>
                <span class="number day"></span>
            </div>
            <div class="line"></div>
            <div class="number-wrapper">
                <div class="line"></div>
                <div class="caption">Часов</div>
                <span class="number hour"></span>
            </div>
            <div class="line"></div>
            <div class="number-wrapper">
                <div class="line"></div>
                <div class="caption">Минут</div>
                <span class="number min"></span>
            </div>
            <div class="line"></div>
            <div class="number-wrapper">
                <div class="line"></div>
                <div class="caption">Секунд</div>
                <span class="number sec"></span>
            </div>
        </div>
        <footer>
            <p>created by <a href="https://vk.com/and4r1lh0">AndสrᎥlh๏</a></p>
        </footer>
    </div>
    <div class="snowflakes" aria-hidden="true">
	<div class="snowflake" aria-hidden="true">❅</div>
  	<div class="snowflake" aria-hidden="true">❆</div>
  	<div class="snowflake" aria-hidden="true">❄</div>
  	<div class="snowflake" aria-hidden="true">❅</div>
  	<div class="snowflake" aria-hidden="true">❆</div>
    </div>
    <div class="at-magnifier-wrapper">
        <div class="at-theme-dark">
            <div class="at-base notranslate" translate="no">
                <div class="Z1-AJ" style="top: 0px; left: 0px;"></div>
            </div>
        </div>
    </div>
</body>
</html>
